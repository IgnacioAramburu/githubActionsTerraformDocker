name: DevOps Pipeline - CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-app

jobs:
  # Job: Preparar infraestructura base (ECR)
  # Se requiere que los repositorios existan antes de que el job build-docker intente hacer el push
  prepare-infra:
    name: Prepare Infrastructure (ECR)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Create ECR Repositories
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -target=aws_ecr_repository.prometheus \
            -target=aws_ecr_repository.grafana \
            -var="docker_image_name=initial" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

  # Job: Análisis estático y linting
  lint-and-analyze:
    name: Lint & Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: PyLint - Análisis de código
        run: pylint src/
        continue-on-error: false

      - name: Black - Verificar formato
        run: black --check src/
        continue-on-error: false

      - name: pip check - Auditoría de seguridad
        run: pip check
        continue-on-error: false

  # Job: Testing y coverage
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-analyze
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests con pytest
        run: pytest src/test_server.py -v --cov=src --cov-report=xml --cov-report=html

      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Subir reporte HTML de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore

  # Job: Generar SBOM
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: lint-and-analyze
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar CycloneDX
        run: pip install cyclonedx-bom

      - name: Generar lista de dependencias
        run: |
          pip freeze > dependencies.txt
          cyclonedx-py requirements requirements.txt --output-format xml --output-file sbom.xml

      - name: Subir SBOM como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.xml
            dependencies.txt
          if-no-files-found: ignore

  # Job: Build imagen Docker
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, prepare-infra]
    permissions:
      contents: read
      packages: write
      security-events: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configurar credenciales de AWS
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push Prometheus Custom Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.prometheus
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/devops-prometheus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push Grafana Custom Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.grafana
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/devops-grafana:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan App Image con Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-app-results.sarif'
        continue-on-error: true

      - name: Scan Prometheus Image con Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/devops-prometheus:latest
          format: 'sarif'
          output: 'trivy-prometheus-results.sarif'
        continue-on-error: true

      - name: Scan Grafana Image con Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/devops-grafana:latest
          format: 'sarif'
          output: 'trivy-grafana-results.sarif'
        continue-on-error: true

      - name: Upload Trivy App results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-app-results.sarif'
          category: 'app-image'

      - name: Upload Trivy Prometheus results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-prometheus-results.sarif'
          category: 'prometheus-image'

      - name: Upload Trivy Grafana results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-grafana-results.sarif'
          category: 'grafana-image'

  # Job: Despliegue en AWS ECS
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: TFLint - Setup
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint - Run
        run: |
          cd terraform
          tflint --init
          tflint --format compact
        continue-on-error: true

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ./terraform

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var="docker_image_name=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Verify Deployment
        run: |
          ALB_DNS=$(cd terraform && terraform output -raw app_url)
          echo "Verificando dominio compartido: $ALB_DNS"
          
          echo "Esperando a que los servicios propaguen en el ALB (90s)..."
          sleep 90
          
          echo "1. Validando App (Puerto 80)..."
          curl -fL "$ALB_DNS/health" || exit 1
          
          echo "2. Validando Prometheus (Puerto 9090)..."
          curl -fL "$ALB_DNS:9090/-/healthy" || exit 1

          echo "3. Validando Grafana (Puerto 3001)..."
          # Grafana puede devolver 200 o 302 (redirect al login), ambos son señal de vida
          curl -sIL "$ALB_DNS:3001/api/health" | grep -E "HTTP/1.1 (200|302)" || exit 1

      - name: Generar reporte de despliegue
        if: success()
        run: |
          echo "# Deployment Report" > deployment-report.md
          echo "Date: $(date)" >> deployment-report.md
          echo "Status: Success" >> deployment-report.md
          echo "Environment: production" >> deployment-report.md
          echo "ALB URL: $(cd terraform && terraform output -raw app_url)" >> deployment-report.md
          echo "Commit SHA: ${{ github.sha }}" >> deployment-report.md

      - name: Subir reporte de despliegue
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md

  # Job: Resumen final
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-and-analyze, test, sbom, build-docker, deploy]
    if: always()
    
    steps:
      - name: Pipeline Status
        run: |
          echo "✅ Pipeline ejecutado"
          echo "📊 Jobs productivos definidos: 5"
          echo "� Artifacts disponibles en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Crear issue si hay fallo
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed on ${context.ref}`,
              body: `Pipeline run #${context.runId} failed. Check details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            })

# Artifacts generados por este pipeline:
# 1. coverage-report: Reporte HTML de cobertura de tests (htmlcov/)
# 2. sbom: Bill of Materials con dependencias (sbom.xml, dependencies.txt)
# 3. deployment-report: Reporte markdown del despliegue (deployment-report.md)
# 4. trivy-results.sarif: Análisis de vulnerabilidades (subido a GitHub Security)