name: DevOps Pipeline - CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:

  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-app

jobs:
  # Job: Preparar infraestructura base (ECR)
  # Se requiere que los repositorios existan antes de que el job build-docker intente hacer el push
  prepare-infra:
    name: Prepare Infrastructure (ECR)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Create ECR Repositories
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -target=aws_ecr_repository.grafana \
            -var="docker_image_name=initial" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

  # Job: Análisis estático y linting
  lint-and-analyze:
    name: Lint & Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: PyLint - Análisis de código
        run: pylint src/server.py --disable=C0103,R0913 || true
        continue-on-error: true

      - name: Black - Verificar formato
        run: black --check src/ || true
        continue-on-error: true

      - name: pip check - Auditoría de seguridad
        run: pip check || true
        continue-on-error: true

  # Job: Testing y coverage
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-analyze
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests con pytest
        run: pytest src/test_server.py -v --cov=src --cov-report=xml --cov-report=html

      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Subir reporte HTML de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore

  # Job: Generar SBOM
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: lint-and-analyze
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar CycloneDX
        run: pip install cyclonedx-bom

      - name: Generar lista de dependencias
        run: |
          pip freeze > dependencies.txt
          cyclonedx-py requirements requirements.txt --output-format xml --output-file sbom.xml

      - name: Subir SBOM como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.xml
            dependencies.txt
          if-no-files-found: ignore

  # Job: Build imagen Docker
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, prepare-infra]
    permissions:
      contents: read
      packages: write
      security-events: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configurar credenciales de AWS
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push Grafana Custom Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.grafana
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/devops-grafana:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan imagen con Trivy (Analisis de vulnerabilidades)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy resultados
        uses: github/codeql-action/upload-sarif@v3
        #Nos aseguramos de que intente de subir el reporte aunque Trivy falle
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Job: Despliegue en AWS ECS
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: TFLint - Setup
        uses: terraform-linters/setup-tflint@v3

      - name: TFLint - Run
        run: |
          cd terraform
          tflint --init
          tflint --format compact
        continue-on-error: true

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ./terraform

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var="docker_image_name=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Verify Deployment
        run: |
          ALB_URL=$(cd terraform && terraform output -raw app_url)
          echo "Verificando despliegue en: $ALB_URL"
          sleep 30
          curl -f "$ALB_URL/health" || echo "La aplicación aún no responde en el ALB"
          
          echo "Verificando acceso a Prometheus UI..."
          PROMETHEUS_URL=$(cd terraform && terraform output -raw prometheus_url || echo "$ALB_URL:9090")
          curl -sI "$PROMETHEUS_URL" | grep "HTTP/1.1 200" || echo "Prometheus UI no accesible externamente"

          echo "Verificando acceso a Grafana UI..."
          GRAFANA_URL=$(cd terraform && terraform output -raw grafana_url || echo "$ALB_URL:3001")
          curl -sI "$GRAFANA_URL" | grep "HTTP/1.1 200" || echo "Grafana UI no accesible externamente"

      - name: Generar reporte de despliegue
        if: success()
        run: |
          echo "# Deployment Report" > deployment-report.md
          echo "Date: $(date)" >> deployment-report.md
          echo "Status: Success" >> deployment-report.md
          echo "Environment: production" >> deployment-report.md
          echo "ALB URL: $(cd terraform && terraform output -raw app_url)" >> deployment-report.md
          echo "Commit SHA: ${{ github.sha }}" >> deployment-report.md

      - name: Subir reporte de despliegue
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md

  # Job: Resumen final
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-and-analyze, test, sbom, build-docker, deploy]
    if: always()
    
    steps:
      - name: Pipeline Status
        run: |
          echo "✅ Pipeline ejecutado"
          echo "📊 Jobs productivos definidos: 5"
          echo "� Artifacts disponibles en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Crear issue si hay fallo
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed on ${context.ref}`,
              body: `Pipeline run #${context.runId} failed. Check details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            })

# Artifacts generados por este pipeline:
# 1. coverage-report: Reporte HTML de cobertura de tests (htmlcov/)
# 2. sbom: Bill of Materials con dependencias (sbom.xml, dependencies.txt)
# 3. deployment-report: Reporte markdown del despliegue (deployment-report.md)
# 4. trivy-results.sarif: Análisis de vulnerabilidades (subido a GitHub Security)